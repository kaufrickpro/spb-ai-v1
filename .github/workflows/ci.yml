name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  typescript:
    name: TypeScript workspaces
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check harness
        run: npm run check:harness

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  ai-service:
    name: AI service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        working-directory: apps/ai-service
        run: uv sync --extra dev

      - name: Lint
        working-directory: apps/ai-service
        run: uv run ruff check .

      - name: Typecheck
        working-directory: apps/ai-service
        run: uv run mypy .

      - name: Test
        working-directory: apps/ai-service
        run: uv run pytest
